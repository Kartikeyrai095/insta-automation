name: Instagram Reel Automation

on:
  schedule:
    # IST-optimized posting times (UTC cron)
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '30 8 * * *'   # 2:00 PM IST
    - cron: '30 13 * * *'  # 7:00 PM IST

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without posting to Instagram'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write  # Needed to commit topic_history.json

jobs:
  generate-and-post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      # 2. Setup Python
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install FFmpeg
      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      # 4. Install Python dependencies
      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      # 5. Create necessary directories
      - name: 📁 Create directories
        run: |
          mkdir -p output logs

      # 6. Run the pipeline
      - name: 🚀 Run Instagram Reel Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          TRENDS_GEO: 'IN'
          VEO_ENABLED: 'true'
          IMAGEN_ENABLED: 'true'
        run: python main.py

      # 7. Upload output as artifacts
      - name: 📤 Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-output-${{ github.run_number }}
          path: |
            output/
            logs/
          retention-days: 3

      # 8. Commit updated topic history
      - name: 💾 Commit topic history
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic_history.json
          git diff --cached --quiet || git commit -m "🤖 Update topic history [skip ci]"
          git push || echo "Push failed (non-fatal)"

      # 9. Cleanup old artifacts
      - name: 🧹 Cleanup output
        if: always()
        run: rm -rf output/*
